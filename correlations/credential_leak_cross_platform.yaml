id: credential_leak_cross_platform
version: "1"
meta:
  name: >
    Email compromised in multiple breach sources
  description: >
    An email address associated with the target was found compromised in
    three or more independent breach databases or infostealer log sources.

    Cross-platform credential exposure indicates widespread compromise and
    significantly increases the risk of credential stuffing attacks.
  risk: HIGH
collections:
  collect:
      - method: exact
        field: type
        value: EMAILADDR_COMPROMISED
aggregation:
  field: source.data
analysis:
  - method: threshold
    field: source.data
    minimum: 3
headline: "Email compromised across 3+ breach sources: {source.data}"
