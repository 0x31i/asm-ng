id: ai_credential_leak_chain
version: "1"
meta:
  name: AI API key leaked with corresponding service detected
  description: >
    An AI API key was found leaked alongside a detected AI
    service, confirming an exploitable credential exposure.
    Attackers can use the key for unauthorized inference,
    billing abuse, or data exfiltration.
  risk: HIGH
collections:
  collect:
    - method: exact
      field: type
      value: AI_API_KEY_LEAKED
aggregation:
  field: data
headline: "AI credential leak confirmed: {data}"
